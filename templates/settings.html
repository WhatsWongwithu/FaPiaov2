<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 · 发票识别系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB; --primary-hover: #1D4ED8;
            --primary-light: #EFF6FF; --primary-border: #BFDBFE;
            --success: #16A34A; --danger: #DC2626;
            --surface: #FFFFFF; --text: #111827; --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF; --border: #E5E7EB; --bg: #F8FAFC;
            --shadow-lg: 0 4px 16px rgba(37,99,235,0.08), 0 2px 6px rgba(37,99,235,0.04);
            --radius: 8px; --radius-lg: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
            width: 480px; max-width: 90vw; padding: 40px;
        }
        .logo {
            width: 48px; height: 48px; background: var(--primary);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: 700;
            font-size: 20px; font-family: 'Poppins', sans-serif; margin: 0 auto 16px;
        }
        .card h1 {
            font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 600;
            text-align: center; margin-bottom: 8px;
        }
        .card .subtitle {
            font-size: 13px; color: var(--text-secondary); text-align: center;
            margin-bottom: 32px;
        }
        .info-box {
            background: var(--primary-light); border: 1px solid var(--primary-border);
            border-radius: var(--radius); padding: 16px; margin-bottom: 24px;
        }
        .info-box p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .info-box a { color: var(--primary); text-decoration: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: var(--text); margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: var(--radius); font-family: 'Inter', sans-serif;
            font-size: 14px; color: var(--text); outline: none;
            transition: border-color 0.15s;
        }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: var(--radius);
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.15s; min-height: 44px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .alert {
            padding: 10px 14px; border-radius: var(--radius); font-size: 13px;
            margin-bottom: 16px; display: none;
        }
        .alert.error { background: #FEF2F2; color: var(--danger); border: 1px solid #FECACA; display: block; }
        .alert.success { background: #F0FDF4; color: var(--success); border: 1px solid #BBF7D0; display: block; }
        .status-tag {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 500; margin-left: 8px;
        }
        .status-tag.has { background: #D1FAE5; color: var(--success); }
        .status-tag.none { background: #FEF3C7; color: #D97706; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">辉</div>
        <h1>API Key 设置</h1>
        <p class="subtitle">当前用户: {{ username }}</p>

        <div class="info-box">
            <p>请输入你的 DeepSeek API Key，系统会用它来解析发票。</p>
            <p>申请地址: <a href="https://platform.deepseek.com" target="_blank">https://platform.deepseek.com</a></p>
            <p>保存后自动记住，下次登录无需重复输入。</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="form-group">
            <label>
                DeepSeek API Key
                {% if has_key %}
                <span class="status-tag has">已设置</span>
                {% else %}
                <span class="status-tag none">未设置</span>
                {% endif %}
            </label>
            <input type="text" class="form-input" id="apiKey"
                   placeholder="sk-xxxxxxxxxxxxxxxxxxxxxx"
                   onkeydown="if(event.key==='Enter')doSave()">
        </div>

        <button class="btn btn-primary" onclick="doSave()">保存</button>
    </div>

    <script>
        function showAlert(type, msg) {
            const box = document.getElementById('alertBox');
            box.className = 'alert ' + type;
            box.textContent = msg;
        }

        async function doSave() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) { showAlert('error', '请输入API Key'); return; }

            try {
                const resp = await fetch('/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey }),
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = data.redirect || '/';
                } else {
                    showAlert('error', data.error || '保存失败');
                }
            } catch (e) {
                showAlert('error', '网络错误，请重试');
            }
        }
    </script>
</body>
</html>
