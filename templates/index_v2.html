<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发票识别系统 V2 - 本地OCR引擎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #0d6e3e 0%, #1a8a4f 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        .upload-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .upload-zone {
            border: 3px dashed #aac8b8;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fdf9;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #0d6e3e;
            background: #e8f5ed;
        }
        .upload-zone .icon { font-size: 48px; margin-bottom: 16px; }
        .upload-zone h3 { font-size: 18px; color: #0d6e3e; margin-bottom: 8px; }
        .upload-zone p { font-size: 14px; color: #666; }
        .upload-zone .formats { margin-top: 12px; font-size: 12px; color: #999; }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: #0d6e3e; color: white; }
        .btn-primary:hover { background: #0a5a32; }
        .btn-success { background: #34a853; color: white; }
        .btn-success:hover { background: #2d8e47; }
        .btn-danger { background: #ea4335; color: white; }
        .btn-danger:hover { background: #c53229; }
        .btn-secondary { background: #e0e0e0; color: #555; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-lg { padding: 12px 32px; font-size: 15px; }

        .progress-section { margin-top: 20px; display: none; }
        .progress-section.active { display: block; }
        .progress-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .progress-item .spinner {
            width: 18px; height: 18px;
            border: 2px solid #ddd;
            border-top-color: #0d6e3e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        .progress-item .check { color: #34a853; margin-right: 12px; font-size: 18px; }
        .progress-item .cross { color: #ea4335; margin-right: 12px; font-size: 18px; }
        .progress-item .info { color: #555; flex: 1; }
        .progress-item .detail { color: #999; font-size: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            flex: 1;
            text-align: center;
        }
        .stat-card .num { font-size: 32px; font-weight: 700; color: #0d6e3e; }
        .stat-card .label { font-size: 13px; color: #666; margin-top: 4px; }

        .results-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
        }
        .results-header h2 { font-size: 18px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f8f9fa; }
        th {
            padding: 12px 10px;
            text-align: center;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e0e0e0;
            white-space: nowrap;
        }
        td {
            padding: 10px 10px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        td.left { text-align: left; }
        tr.invoice-start { border-top: 2px solid #0d6e3e; }
        tr.invoice-start td { background: #f0f9f3; }

        .action-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>发票识别系统 V2<span class="badge">本地OCR · 无需联网</span></h1>
        <p>上海辉驰包装设备有限公司 · 财务部</p>
    </div>

    <div class="container">
        <div class="upload-card">
            <div class="upload-zone" id="uploadZone">
                <div class="icon">📄</div>
                <h3>拖拽发票文件到此处，或点击选择</h3>
                <p>支持批量上传，系统自动识别发票内容并归类</p>
                <div class="formats">支持格式：JPG / PNG / BMP / TIFF / PDF（本地识别，数据不上传）</div>
            </div>
            <input type="file" id="fileInput" multiple
                   accept=".jpg,.jpeg,.png,.bmp,.tif,.tiff,.pdf" style="display:none">

            <div class="progress-section" id="progressSection"></div>
        </div>

        <div class="stats" id="statsBar" style="display:none">
            <div class="stat-card">
                <div class="num" id="statInvoices">0</div>
                <div class="label">发票数量</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statItems">0</div>
                <div class="label">明细行数</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statAmount">¥0</div>
                <div class="label">价税合计</div>
            </div>
        </div>

        <div class="results-card" id="resultsCard" style="display:none">
            <div class="results-header">
                <h2>识别结果</h2>
                <button class="btn btn-secondary" onclick="clearAll()">清空全部</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>开票日期</th>
                            <th>品名</th>
                            <th>规格</th>
                            <th>数量</th>
                            <th>单价</th>
                            <th>金额</th>
                            <th>税率</th>
                            <th>税额</th>
                            <th>发票总金额</th>
                            <th>票号</th>
                            <th>供应商名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
            <div class="action-bar">
                <button class="btn btn-success btn-lg" onclick="downloadExcel()">
                    ⬇ 下载 Excel
                </button>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const progressSection = document.getElementById('progressSection');
        const resultsCard = document.getElementById('resultsCard');
        const statsBar = document.getElementById('statsBar');

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        async function handleFiles(files) {
            if (!files.length) return;
            progressSection.classList.add('active');
            progressSection.innerHTML = '';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const item = document.createElement('div');
                item.className = 'progress-item';
                item.innerHTML = `
                    <div class="spinner"></div>
                    <div class="info">[${i+1}/${files.length}] 识别中: ${file.name}</div>
                `;
                progressSection.appendChild(item);

                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    const resp = await fetch('/upload', { method: 'POST', body: formData });
                    const data = await resp.json();

                    if (data.success) {
                        const inv = data.invoice;
                        item.innerHTML = `
                            <div class="check">✅</div>
                            <div class="info">${file.name}</div>
                            <div class="detail">${inv.seller_name} | ${inv.invoice_num} | ${inv.item_count}条明细</div>
                        `;
                    } else {
                        item.innerHTML = `
                            <div class="cross">❌</div>
                            <div class="info">${file.name}</div>
                            <div class="detail">${data.error}</div>
                        `;
                    }
                } catch (err) {
                    item.innerHTML = `
                        <div class="cross">❌</div>
                        <div class="info">${file.name}</div>
                        <div class="detail">错误: ${err.message}</div>
                    `;
                }
                progressSection.lastChild.scrollIntoView({ behavior: 'smooth' });
            }
            loadResults();
        }

        async function loadResults() {
            const resp = await fetch('/results');
            const data = await resp.json();
            renderResults(data.invoices);
        }

        function renderResults(invoices) {
            const tbody = document.getElementById('resultsBody');
            if (!invoices.length) {
                resultsCard.style.display = 'none';
                statsBar.style.display = 'none';
                return;
            }
            resultsCard.style.display = 'block';
            statsBar.style.display = 'flex';

            let totalItems = 0;
            let totalAmount = 0;
            invoices.forEach(inv => {
                totalItems += inv.item_count;
                const amt = parseFloat(inv.total_amount) || 0;
                totalAmount += amt;
            });
            document.getElementById('statInvoices').textContent = invoices.length;
            document.getElementById('statItems').textContent = totalItems;
            document.getElementById('statAmount').textContent = '¥' + totalAmount.toFixed(2);

            tbody.innerHTML = '';
            invoices.forEach((inv, idx) => {
                inv.items.forEach((item, i) => {
                    const tr = document.createElement('tr');
                    if (i === 0) tr.className = 'invoice-start';
                    tr.innerHTML = `
                        <td>${i === 0 ? idx + 1 : ''}</td>
                        <td>${i === 0 ? inv.date : ''}</td>
                        <td class="left">${item.name || ''}</td>
                        <td class="left">${item.spec || ''}</td>
                        <td>${item.qty || ''}</td>
                        <td>${item.price || ''}</td>
                        <td>${item.amount || ''}</td>
                        <td>${item.tax_rate || ''}</td>
                        <td>${item.tax || ''}</td>
                        <td>${i === 0 ? inv.total_amount : ''}</td>
                        <td>${i === 0 ? 'NO.' + inv.invoice_num : ''}</td>
                        <td class="left">${inv.seller_name || ''}</td>
                        <td>${i === 0 ? `<button class="btn btn-danger" style="padding:4px 10px;font-size:12px" onclick="deleteInvoice('${inv.id}')">删除</button>` : ''}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        async function deleteInvoice(id) {
            if (!confirm('确认删除该发票？')) return;
            await fetch(`/delete/${id}`);
            loadResults();
        }

        async function clearAll() {
            if (!confirm('确认清空所有识别结果？')) return;
            await fetch('/clear');
            progressSection.innerHTML = '';
            progressSection.classList.remove('active');
            loadResults();
        }

        function downloadExcel() {
            window.location.href = '/download';
        }

        loadResults();
    </script>
</body>
</html>
